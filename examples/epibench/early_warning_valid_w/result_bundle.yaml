schema_version: epibench.result_bundle.v1
run_id: early_warning_valid_demo
track: W
requested_claim: E2-PI
dataset_card_path: ../pilot_t1_eeg/dataset_card.yaml
split_manifest_path: split_manifest.yaml
failure_trace_path: failure_trace.yaml
model:
  name: early_warning_threshold_demo
  family: warning_baseline
  commit_sha: demo-not-a-real-result
environment:
  python: "3.12"
  platform: protocol-demo
  dependencies:
    - numpy
inputs:
  - path: examples/epibench/pilot_t1_eeg/result_bundle.yaml
    sha256: null
outputs:
  - path: reports/epibench_early_warning_valid_claim.json
    sha256: null
metrics:
  event_sensitivity: 0.76
  false_alarms_per_24h: 1.4
  event_f1: 0.55
  precision: 0.43
  warning_horizon_seconds: 300
  median_warning_lead_time_seconds: 620
  p95_warning_lead_time_seconds: 1800
  post_event_alarm_counted_as_success: false
score_inputs:
  subscores:
    performance: 0.68
    clinical_safety: 0.66
    robustness: 0.64
    stability: 0.62
    latency: 0.78
    calibration: 0.58
hardware: null
reproduction:
  command: python scripts/epibench.py certify examples/epibench/early_warning_valid_w/result_bundle.yaml
  container_or_env: local-python
  checksums: []

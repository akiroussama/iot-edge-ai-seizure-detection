<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset=".6" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f4e79"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity=".10"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bgGrad)"/>

  <!-- Header -->
  <rect x="0" y="0" width="1280" height="86" fill="url(#header)"/>
  <text x="40" y="40" fill="#ffffff" font-size="22" font-weight="700">SeizureGuard — IoMT / Edge AI</text>
  <text x="40" y="68" fill="#cbd5e1" font-size="14">Réplication critique de Raman &amp; Velmurugan 2025 — SeizeIT2 — LOSO — TinyML ESP32 — Groupe 2 SUP'COM</text>
  <text x="1240" y="40" fill="#cbd5e1" font-size="13" text-anchor="end">Single source of truth</text>
  <text x="1240" y="60" fill="#a7f3d0" font-size="13" text-anchor="end">RF 3,25 %  ·  MLP 8,7 %  ·  baseline 97,37 %</text>

  <!-- Step 1 : Paper -->
  <g filter="url(#soft)">
    <rect x="40" y="120" width="220" height="120" rx="14" fill="#ffffff" stroke="#dbe4ee"/>
    <text x="60" y="148" font-size="14" font-weight="700" fill="#0f172a">1. Paper</text>
    <text x="60" y="170" font-size="12" fill="#475569">Raman &amp; Velmurugan 2025</text>
    <text x="60" y="188" font-size="12" fill="#475569">IoMT, MPU6050, RF, simulation</text>
    <text x="60" y="206" font-size="12" fill="#475569">100 % en simulation (30 échantillons)</text>
    <text x="60" y="225" font-size="11" fill="#c2410c">⚑ audit critique : 4 contradictions</text>
  </g>

  <!-- Step 2 : Dataset -->
  <g filter="url(#soft)">
    <rect x="290" y="120" width="220" height="120" rx="14" fill="#ffffff" stroke="#dbe4ee"/>
    <text x="310" y="148" font-size="14" font-weight="700" fill="#0f172a">2. Données réelles</text>
    <text x="310" y="170" font-size="12" fill="#475569">SeizeIT2 (OpenNeuro ds005873)</text>
    <text x="310" y="188" font-size="12" fill="#475569">6 patients, EEG + IMU</text>
    <text x="310" y="206" font-size="12" fill="#475569">33 925 fenêtres test</text>
    <text x="310" y="225" font-size="11" fill="#1f4e79">893 fenêtres de crise (prévalence 2,63 %)</text>
  </g>

  <!-- Step 3 : Preproc -->
  <g filter="url(#soft)">
    <rect x="540" y="120" width="220" height="120" rx="14" fill="#ffffff" stroke="#dbe4ee"/>
    <text x="560" y="148" font-size="14" font-weight="700" fill="#0f172a">3. Preprocessing</text>
    <text x="560" y="170" font-size="12" fill="#475569">Butterworth 0,5–12 Hz EEG</text>
    <text x="560" y="188" font-size="12" fill="#475569">Butterworth 0,1–10 Hz IMU</text>
    <text x="560" y="206" font-size="12" fill="#475569">Fenêtres glissantes 4 s</text>
    <text x="560" y="225" font-size="11" fill="#1f4e79">80 features : variance, skew, HFD, SE…</text>
  </g>

  <!-- Step 4 : Models -->
  <g filter="url(#soft)">
    <rect x="790" y="120" width="220" height="120" rx="14" fill="#ffffff" stroke="#dbe4ee"/>
    <text x="810" y="148" font-size="14" font-weight="700" fill="#0f172a">4. Modèles</text>
    <text x="810" y="170" font-size="12" fill="#475569">Decision Tree · SVM RBF</text>
    <text x="810" y="188" font-size="12" fill="#475569">Random Forest (référence paper)</text>
    <text x="810" y="206" font-size="12" fill="#475569">MLP TinyML 80→32→16→1</text>
    <text x="810" y="225" font-size="11" fill="#0f766e">INT8 quantization pour ESP32</text>
  </g>

  <!-- Step 5 : LOSO -->
  <g filter="url(#soft)">
    <rect x="1040" y="120" width="220" height="120" rx="14" fill="#ffffff" stroke="#dbe4ee"/>
    <text x="1060" y="148" font-size="14" font-weight="700" fill="#0f172a">5. Validation LOSO</text>
    <text x="1060" y="170" font-size="12" fill="#475569">Leave-One-Subject-Out</text>
    <text x="1060" y="188" font-size="12" fill="#475569">Recall pooled = ΣTP / ΣN_pos</text>
    <text x="1060" y="206" font-size="12" fill="#475569">Critique sur prévalence faible</text>
    <text x="1060" y="225" font-size="11" fill="#c2410c">accuracy trompeuse vs dummy</text>
  </g>

  <!-- Arrows between steps 1-5 -->
  <line x1="260" y1="180" x2="290" y2="180" stroke="#1f4e79" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="510" y1="180" x2="540" y2="180" stroke="#1f4e79" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="760" y1="180" x2="790" y2="180" stroke="#1f4e79" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1010" y1="180" x2="1040" y2="180" stroke="#1f4e79" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Down arrow to results bar -->
  <line x1="640" y1="248" x2="640" y2="276" stroke="#1f4e79" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Results band -->
  <g filter="url(#soft)">
    <rect x="40" y="290" width="1220" height="120" rx="14" fill="#ffffff" stroke="#dbe4ee"/>
    <text x="60" y="318" font-size="14" font-weight="700" fill="#0f172a">6. Résultats LOSO (patients réels) — recall pooled</text>

    <!-- mini bar chart -->
    <g transform="translate(60,330)">
      <!-- baselines line -->
      <line x1="0" y1="60" x2="640" y2="60" stroke="#cbd5e1" stroke-dasharray="4 4"/>
      <text x="650" y="64" font-size="11" fill="#64748b">0 % recall (dummy "tous négatifs")</text>

      <!-- bars -->
      <g>
        <rect x="0"   y="34" width="80" height="26" fill="#1f4e79"/>
        <text x="40" y="78" font-size="12" text-anchor="middle" fill="#0f172a">DT</text>
        <text x="40" y="29" font-size="12" text-anchor="middle" fill="#0f172a">11,0 %</text>
      </g>
      <g>
        <rect x="120" y="42" width="80" height="18" fill="#1f4e79"/>
        <text x="160" y="78" font-size="12" text-anchor="middle" fill="#0f172a">SVM RBF</text>
        <text x="160" y="37" font-size="12" text-anchor="middle" fill="#0f172a">6,5 %</text>
      </g>
      <g>
        <rect x="240" y="51" width="80" height="9" fill="#c2410c"/>
        <text x="280" y="78" font-size="12" text-anchor="middle" fill="#0f172a">Random Forest</text>
        <text x="280" y="46" font-size="12" text-anchor="middle" fill="#c2410c" font-weight="700">3,25 %</text>
      </g>
      <g>
        <rect x="360" y="38" width="80" height="22" fill="#0f766e"/>
        <text x="400" y="78" font-size="12" text-anchor="middle" fill="#0f172a">MLP TinyML</text>
        <text x="400" y="33" font-size="12" text-anchor="middle" fill="#0f766e" font-weight="700">8,7 %</text>
      </g>
    </g>

    <text x="800" y="345" font-size="12" fill="#475569">Lecture clinique :</text>
    <text x="800" y="365" font-size="12" fill="#475569">• L'accuracy seule trompe (baseline ≈ 97,37 %).</text>
    <text x="800" y="383" font-size="12" fill="#475569">• Aucun modèle n'atteint un recall cliniquement utile.</text>
    <text x="800" y="401" font-size="12" fill="#0f766e">• MLP TinyML : meilleur compromis Edge AI.</text>
  </g>

  <!-- Edge AI -->
  <g filter="url(#soft)">
    <rect x="40" y="440" width="595" height="160" rx="14" fill="#ffffff" stroke="#dbe4ee"/>
    <text x="60" y="468" font-size="14" font-weight="700" fill="#0f172a">7. Edge AI (ESP32, 520 KB SRAM)</text>
    <text x="60" y="492" font-size="12" fill="#475569">Random Forest INT8 :</text>
    <text x="240" y="492" font-size="12" fill="#0f172a" font-weight="600">357 KB · 18,5 µs · 69 % SRAM</text>
    <text x="60" y="514" font-size="12" fill="#475569">MLP TinyML INT8 :</text>
    <text x="240" y="514" font-size="12" fill="#0f766e" font-weight="700">6,4 KB · 19,3 µs · 1,2 % SRAM</text>
    <text x="60" y="538" font-size="12" fill="#475569">Ratio mémoire :</text>
    <text x="240" y="538" font-size="12" fill="#0f172a" font-weight="600">56× plus petit pour le MLP</text>
    <text x="60" y="568" font-size="11" fill="#c2410c">⚑ Faisable techniquement, insuffisant cliniquement en l'état.</text>
  </g>

  <!-- Transparency -->
  <g filter="url(#soft)">
    <rect x="665" y="440" width="595" height="160" rx="14" fill="#ffffff" stroke="#dbe4ee"/>
    <text x="685" y="468" font-size="14" font-weight="700" fill="#0f172a">8. Livrables &amp; transparence IA</text>
    <text x="685" y="492" font-size="12" fill="#475569">• Site Streamlit (portfolio interactif)</text>
    <text x="685" y="510" font-size="12" fill="#475569">• Notebook Google Colab (lancement web sans installation)</text>
    <text x="685" y="528" font-size="12" fill="#475569">• Rapport PDF + présentation PDF</text>
    <text x="685" y="546" font-size="12" fill="#475569">• docs/REPRODUCTION.md : reproduction scientifique pas à pas</text>
    <text x="685" y="564" font-size="12" fill="#475569">• presentation/trace_ia.md : outils IA, hallucinations, corrections</text>
    <text x="685" y="585" font-size="11" fill="#1f4e79">Repository : github.com/akiroussama/iot-edge-ai-seizure-detection</text>
  </g>
</svg>

name: paper_artifact_package
status: pre_gate_c_reproducibility_package
objective: link paper claims to committed artifacts or explicit sources
outputs:
  - paper_artifact_inventory.csv
  - paper_claim_traceability.csv
  - paper_reproducibility_checklist.csv
  - paper_artifact_manifest.json
  - paper_artifact_package.md
claim_table_required_columns:
  - claim_id
  - claim_text
  - artifact_path
  - citation_status
  - gate_c_status
recommended_optional_columns:
  - paper_section
  - source_uri
  - source_verification_status
  - claim_status
guardrails:
  - Citable artifact packages require gate_c_status=passed.
  - Every paper claim must link to a committed artifact or explicit source URI.
  - Source-only claims are not ready unless source_verification_status records primary-source verification.
  - Source URI presence is not source verification; final manuscript claims still require primary-source audit.
  - Pre-Gate-C benchmark numbers must remain non-citable.
  - External SOTA claims require row-level recomputation under the EpiTwin runner.
  - Negative and null-overlapping results are valid reportable outcomes.
